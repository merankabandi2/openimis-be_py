name: Automated CI testing
# This workflow runs automatically for every commit on GitHub. It checks syntax and launches tests.

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        description: 'A sonar access token passed from the caller workflow'
        required: false
    inputs:
      SONAR_PROJECT_KEY:
        description: 'SonarQube Project Key'
        required: false
        type: string
      SONAR_ORGANIZATION:
        description: 'SonarQube Organization'
        required: false
        type: string
      SONAR_PROJECT_NAME:
        description: 'SonarQube Project Name'
        required: false
        type: string
      SONAR_PROJECT_VERSION:
        description: 'SonarQube Project Version'
        required: false
        type: string
      SONAR_EXCLUSIONS:
        description: 'SonarQube Project Exclusions'
        required: false
        type: string
      SONAR_SOURCES:
        description: 'SonarQube Project Sources'
        required: false
        type: string
      branchName:
        required: false
        type: string
        default: 'develop'

jobs:
  build_backend:
    name: Build Backend
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull openIMIS Backend
        run: |
          # ------------------------------------------------------------------
          # Determine which branch of openimis-be_py we should use
          # ------------------------------------------------------------------
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "pull_request_target" ]]; then
            # For PRs → always use the base branch (where the PR is merged into)
            TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
            echo "Event is a Pull Request → using base branch: $TARGET_BRANCH"
          else
            # For push (direct commit on a branch), workflow_dispatch, etc.
            # → use the CURRENT branch name (e.g. feature/xyz, hotfix/abc, main, develop…)
            CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
            TARGET_BRANCH="$CURRENT_BRANCH"
            echo "Not a PR → using current branch: $TARGET_BRANCH"
          fi

          # Final fallback only if something went terribly wrong
          if [[ -z "$TARGET_BRANCH" ]]; then
            echo "WARNING: TARGET_BRANCH is empty! Falling back to 'develop'"
            TARGET_BRANCH="develop"
          fi

          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV
          echo "Cloning openimis-be_py from branch: $TARGET_BRANCH"

          # Clone with the determined branch
          rm -rf ./openimis
          git clone --depth=1 --branch="$TARGET_BRANCH" https://github.com/openimis/openimis-be_py.git ./openimis || {
            echo "Failed to clone branch '$TARGET_BRANCH' – falling back to 'develop'"
            git clone --depth=1 --branch=develop https://github.com/openimis/openimis-be_py.git ./openimis
            echo "Cloned fallback branch: develop"
          }

          # Verify what we actually got
          cd ./openimis
          CLONED_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Actually cloned branch: $CLONED_BRANCH"

      - name: Copy Current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: './current-module'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Update the configuration
        working-directory: ./openimis
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

          export MODULE_NAME="$(echo $GITHUB_REPOSITORY | sed 's#^openimis/openimis-be-\(.*\)_py$#\1#')"
          echo "MODULE_NAME=$MODULE_NAME" >> $GITHUB_ENV

          # Replace or add the current module as editable local path
          jq --arg name "$MODULE_NAME" \
             'if (.modules[]?.name == $name) then
                (.modules[] | select(.name == $name)).pip = "-e ../../current-module"
              else
                .modules += [{name: $name, pip: "-e ../../current-module"}]
              end' openimis.json > openimis.json.tmp && mv openimis.json.tmp openimis.json

          cat openimis.json

      - name: Install Python dependencies
        working-directory: ./openimis/script
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
          python modules-requirements.py ../openimis.json > modules-requirements.txt
          cat modules-requirements.txt
          pip install --no-cache-dir -r modules-requirements.txt

      - name: Environment info
        run: |
          pip list

      - name: Locate site-packages and set env
        id: locate
        run: |
          SITE_PACKAGES=$(python -c "from distutils.sysconfig import get_python_lib; print(get_python_lib())")
          echo "SITE_PACKAGES=$SITE_PACKAGES" >> $GITHUB_ENV

      - name: Compress IMIS artifacts
        run: |
          tar -czf site-packages.tar.gz -C "${{ env.SITE_PACKAGES }}" .
          tar -czf openimis.tar.gz ./openimis ./current-module

      - name: Upload compressed site-packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-packages
          path: site-packages.tar.gz

      - name: Upload build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-artifacts
          path: openimis.tar.gz

  # ----------------------------------------------------------------------
  # The rest of your jobs (tests, flake8, etc.) remain unchanged
  # ----------------------------------------------------------------------
  ci_module_psql_test_module_only:
    name: Run Module Tests (PSQL)
    runs-on: ubuntu-24.04
    needs: build_backend
    services:
      opensearch:
        image: opensearchproject/opensearch:latest
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          cluster.name: my_opensearch_local
          http.port: 9200
          plugins.security.ssl.http.enabled: false
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: B9wc9VrqX7pY
        options: >-
          --health-cmd "curl -f -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      pgsql:
        image: ghcr.io/openimis/openimis-pgsql:develop
        env:
          POSTGRES_DB: test_imis
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: YourStrong!Passw0rd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: site-packages
          path: /tmp/

      - name: Download code artifacts
        uses: actions/download-artifact@v4
        with:
          name: code-artifacts
          path: /tmp/

      - name: Locate site-packages
        run: |
          SITE_PACKAGES=$(python -c "from distutils.sysconfig import get_python_lib; print(get_python_lib())")
          echo "SITE_PACKAGES=$SITE_PACKAGES" >> $GITHUB_ENV

      - name: Decompress artifacts
        run: |
          sudo tar -xzf /tmp/site-packages.tar.gz -C "${{ env.SITE_PACKAGES }}"
          sudo tar -xzf /tmp/openimis.tar.gz -C .

      - name: Initialize PSQL
        run: |
          export DB_NAME_TEST="test_imis"
          git clone --depth=1 --branch=develop https://github.com/openimis/database_postgresql.git ./sql_psql
          sudo bash ./sql_psql/install_postgres_json_schema_extension.sh
          echo 'set search_path to public' >> ~/.psqlrc
          PGPASSWORD=YourStrong!Passw0rd psql -U postgres -h localhost -d test_imis -f ./sql_psql/database\ scripts/json_schema_extension.sql | grep . | uniq -c
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: YourStrong!Passw0rd

      - name: Django tests PSQL (module only)
        working-directory: ./openimis/openIMIS
        if: success() || failure()
        run: |
          export MODULE_NAME="$(echo $GITHUB_REPOSITORY | sed 's#^openimis/openimis-be-\(.*\)_py$#\1#')"
          python manage.py test --keepdb $MODULE_NAME
        env:
          SECRET_KEY: secret
          MODE: DEV
          DB_DEFAULT: postgresql
          CELERY_BROKER_URL: "memory://openIMIS-test//"
          CELERY_RESULT_BACKEND: "cache+memory://openIMIS-test//"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_imis
          DB_TEST_NAME: test_imis
          DB_USER: postgres
          DB_PASSWORD: YourStrong!Passw0rd
          SITE_ROOT: api
          OPENSEARCH_ADMIN: admin
          OPENSEARCH_PASSWORD: B9wc9VrqX7pY
          OPEN_SEARCH_HTTP_PORT: 9200
          OPENSEARCH_HOSTS: "localhost:9200"

  # ... (rest of your jobs: ci_module_psql_test, flake-8-linter, etc.)
  # They stay exactly the same – only the backend cloning logic was changed.
